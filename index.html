<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal LAZISNU SUMOKEMBANGSRI</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  
  <style>
    :root { --bg-body: #FDFBF7; --bg-card: #FFFFFF; --accent: #B5C19E; --dark: #2E3524; --danger: #ef4444; --success: #16a34a; --warning: #d97706; }
    * { box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg-body); color: var(--dark); overflow-x: hidden; }
    
    /* NAVBAR CLEAN */
    .navbar { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; color: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .logo { font-weight: 700; font-size: 1.1rem; line-height: 1.2; text-transform: uppercase; }
    .nav-menu { display: flex; align-items: center; gap: 20px; }
    .nav-item { cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #cbd5e1; text-transform: uppercase; transition: color 0.3s; }
    .nav-item:hover, .nav-item.active { color: #fff; }
    .btn-logout { background: var(--danger); color: #fff; padding: 8px 16px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; font-family: 'Montserrat'; }
    
    .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card { background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 2px 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f5f9; }
    h2, h3 { color: var(--dark); margin-top: 0; font-weight: 700; }
    
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 8px; font-size: 0.95rem; font-family: 'Montserrat'; }
    
    .btn-submit { width: 100%; padding: 14px; background: var(--dark); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    .btn-secondary { background: #64748b; }
    
    .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;}
    .menu-box { background: var(--bg-card); border: 2px solid var(--accent); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: 700; transition: all 0.3s;}
    .menu-box:hover { background: var(--accent); transform: translateY(-3px); }
    
    .list-item { background: var(--bg-card); padding: 18px; margin-bottom: 15px; border-radius: 8px; box-shadow: 2px 2px 8px rgba(0,0,0,0.06); position: relative;}
    
    /* BADGE NEW KOTAK */
    .badge-new { background: var(--success); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 8px; display: inline-block; vertical-align: middle; }
    .histori-text { font-size: 0.8rem; color: #d97706; font-weight: 600; margin-top: 4px; display: block; }
    
    /* RUNNING TEXT */
    .rt-container { width: 100vw; margin-left: calc(-50vw + 50%); background: #fef08a; color: #b45309; padding: 10px 0; overflow: hidden; white-space: nowrap; font-weight: 700; display: none; border-bottom: 2px solid #fde047; margin-bottom: 20px; }
    .rt-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
    @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
    .modal-box { background: #fff; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">LAZISNU<br>SUMOKEMBANGSRI</div>
    <div class="nav-menu">
      <span class="nav-item" onclick="pindahHalaman('home')">HOME</span>
      <span class="nav-item" id="nav-dash" style="display:none;" onclick="pindahHalaman('dashboard')">DASHBOARD</span>
      <button id="nav-logout" class="btn-logout" style="display:none;" onclick="logout()">LOGOUT</button>
    </div>
  </nav>

  <div class="container">
    <div id="page-home" class="page active">
      <div class="card" style="text-align: center; border-top: 6px solid var(--dark);">
        <h2>Portal LAZISNU</h2>
        <button class="btn-submit" onclick="pindahHalaman('login')">Masuk ke Sistem</button>
      </div>
    </div>

    <div id="page-login" class="page">
      <div class="card" style="max-width: 400px; margin: auto;">
        <h2>Login Amil</h2>
        <div class="form-group"><label>Nickname</label><input type="text" id="l-nick"></div>
        <div class="form-group"><label>Password</label><input type="password" id="l-pass"></div>
        <button class="btn-submit" onclick="prosesLoginWeb()">Masuk</button>
      </div>
    </div>

    <div id="page-dashboard" class="page">
      <div class="card"><h2>Dashboard <span id="d-role"></span></h2><p>Selamat bertugas, <b id="d-nama"></b>!</p></div>
      <div id="banner-pengumuman" class="rt-container"><div class="rt-text" id="teks-pengumuman"></div></div>
      <div class="grid-menu" id="menu-container"></div>
    </div>

    <div id="page-ajukan" class="page">
      <div class="card">
        <h3>Ajukan Mustahiq</h3>
        <div class="form-group">
          <label>Tipe Pengajuan</label>
          <select id="aju-tipe" onchange="toggleAjuMode()">
            <option value="BARU">Usulan Warga Baru</option>
            <option value="EDIT">Perubahan Data Lama</option>
          </select>
        </div>
        
        <div id="box-cari-mustahiq" class="form-group" style="display:none;">
          <label>Cari Nama Mustahiq Lama</label>
          <select id="aju-pilih-nama" onchange="isiDataOtomatis()"></select>
        </div>

        <div class="flex-gap">
          <div class="form-group"><label>Dusun</label><input type="text" id="aju-dusun" readonly></div>
          <div class="form-group"><label>RW</label><input type="text" id="aju-rw"></div>
          <div class="form-group"><label>RT</label><input type="text" id="aju-rt"></div>
        </div>
        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="aju-nama"></div>
        <div class="form-group">
          <label>Kategori</label>
          <select id="aju-kat">
            <option value="Fakir">Fakir</option><option value="Miskin">Miskin</option>
            <option value="Yatim">Yatim</option><option value="Sabilillah">Sabilillah</option>
          </select>
        </div>
        <button class="btn-submit" onclick="kirimAju()">Kirim Pengajuan</button>
        <button class="btn-submit btn-secondary" onclick="pindahHalaman('dashboard')">Kembali</button>
      </div>
    </div>

    <div id="page-laporan-dist" class="page">
      <div class="card">
        <h2>Laporan Distribusi</h2>
        <div class="form-group"><input type="text" id="search-dist" placeholder="Cari nama..." onkeyup="filterDist()"></div>
        <div id="list-distribusi"></div>
        <button class="btn-submit btn-secondary" onclick="pindahHalaman('dashboard')">Kembali</button>
      </div>
    </div>

    <div id="page-konfirmasi" class="page">
      <div class="card">
        <h2>Konfirmasi Pengajuan</h2>
        <div id="list-pengajuan"></div>
        <button class="btn-submit btn-secondary" onclick="pindahHalaman('dashboard')">Kembali</button>
      </div>
    </div>

    <div id="modalP" class="modal-overlay">
      <div class="modal-box">
        <h3>Buat Notif Dashboard</h3>
        <div class="form-group"><label>Isi Pesan</label><input type="text" id="p-pesan"></div>
        <div class="form-group"><label>Batas Waktu</label><input type="datetime-local" id="p-batas"></div>
        <button class="btn-submit" onclick="saveP()">Sebarkan</button>
        <button class="btn-submit btn-secondary" onclick="closeModalP()">Batal</button>
      </div>
    </div>
  </div>

  <div id="modalMsg" class="modal-overlay"><div class="modal-box" style="text-align:center;"><p id="msgText"></p><button class="btn-submit" onclick="closeMsg()">OK</button></div></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxJMDKRdttXGU-a7XoXSRPoTSkU3Htpnx8goOAF7IpGvxMm7msaVj3XSzJjLq1JWLhb/exec";
    let user = null; let masterM = [];

    async function kirim(d) { try { let r = await fetch(API, { method: 'POST', body: JSON.stringify(d) }); return await r.json(); } catch(e) { return {sukses:false}; } }
    
    function pindahHalaman(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-'+id).classList.add('active');
      if(id === 'laporan-dist') fetchMaster();
      if(id === 'konfirmasi') fetchAju();
      if(id === 'ajukan') {
        document.getElementById('aju-dusun').value = user.dusun;
        toggleAjuMode();
      }
    }

    async function prosesLoginWeb() {
      let n = document.getElementById('l-nick').value;
      let p = document.getElementById('l-pass').value;
      let res = await kirim({action:"login", nickname:n, password:p});
      if(res.sukses) {
        user = res.data;
        document.getElementById('d-nama').innerText = user.nama;
        document.getElementById('d-role').innerText = user.role;
        document.getElementById('nav-dash').style.display = 'block';
        document.getElementById('nav-logout').style.display = 'block';
        renderMenu();
        fetchNotif();
        pindahHalaman('dashboard');
      } else alert("Gagal Login!");
    }

    function renderMenu() {
      let h = `<div class="menu-box" onclick="pindahHalaman('ajukan')">📝 Ajukan Mustahiq</div>
               <div class="menu-box" onclick="pindahHalaman('laporan-dist')">📦 Laporan Distribusi</div>`;
      if(user.role === 'Pengurus') {
        h += `<div class="menu-box" style="color:var(--warning)" onclick="pindahHalaman('konfirmasi')">📩 Konfirmasi Aju</div>
              <div class="menu-box" style="color:var(--warning)" onclick="openModalP()">📢 Buat Notif</div>`;
      }
      document.getElementById('menu-container').innerHTML = h;
    }

    async function fetchMaster() {
      let res = await kirim({action:"getMasterMustahiq"});
      if(res.sukses) { masterM = res.data; renderDist(); }
    }

    function renderDist() {
      let h = "";
      masterM.forEach(d => {
        let labelNew = d.label === 'NEW' ? `<span class="badge-new">NEW !</span>` : "";
        let histori = d.histori ? `<span class="histori-text">Riwayat: ${d.histori}</span>` : "";
        h += `<div class="list-item">
                <div style="font-weight:700; font-size:1.1rem;">${labelNew}${d.nama}</div>
                <div style="font-size:0.85rem; color:#64748b; margin-top:5px;">Dusun ${d.dusun} | ${d.rw}/RT ${d.rt}</div>
                ${histori}
                <div style="margin-top:10px;"><span class="badge-new" style="background:${d.status==='Belum'?'#cbd5e1':''}">${d.status}</span></div>
              </div>`;
      });
      document.getElementById('list-distribusi').innerHTML = h;
    }

    // PENGUMUMAN
    async function fetchNotif() {
      let res = await kirim({action:"getPengumuman"});
      if(res.sukses && res.data) {
        document.getElementById('teks-pengumuman').innerText = "📢 INFO: " + res.data;
        document.getElementById('banner-pengumuman').style.display = 'block';
      }
    }

    // AJUKAN LOGIC
    function toggleAjuMode() {
      let tipe = document.getElementById('aju-tipe').value;
      let box = document.getElementById('box-cari-mustahiq');
      if(tipe === 'EDIT') {
        box.style.display = 'block';
        let opt = '<option value="">-- Pilih Nama --</option>';
        masterM.forEach(m => opt += `<option value="${m.id}">${m.nama}</option>`);
        document.getElementById('aju-pilih-nama').innerHTML = opt;
      } else {
        box.style.display = 'none';
        document.getElementById('aju-nama').value = "";
      }
    }

    function isiDataOtomatis() {
      let id = document.getElementById('aju-pilih-nama').value;
      let d = masterM.find(x => x.id == id);
      if(d) {
        document.getElementById('aju-nama').value = d.nama;
        document.getElementById('aju-rw').value = d.rw;
        document.getElementById('aju-rt').value = d.rt;
        document.getElementById('aju-kat').value = d.kategori;
      }
    }

    async function kirimAju() {
      let o = {
        tipe: document.getElementById('aju-tipe').value,
        dusun: document.getElementById('aju-dusun').value,
        rw: document.getElementById('aju-rw').value,
        rt: document.getElementById('aju-rt').value,
        nama: document.getElementById('aju-nama').value,
        kategori: document.getElementById('aju-kat').value,
        amil: user.nama,
        idMaster: document.getElementById('aju-pilih-nama').value
      };
      let res = await kirim({action:"ajukanMustahiq", obj:o});
      if(res.sukses) { alert("Berhasil Diajukan!"); pindahHalaman('dashboard'); }
    }

    async function fetchAju() {
      let res = await kirim({action:"getPengajuan"});
      if(res.sukses) {
        let h = "";
        res.data.forEach(d => {
          h += `<div class="list-item">
                  <b>[${d.tipe}]</b> ${d.nama} (${d.kategori})<br>
                  <small>Dusun ${d.dusun} | Amil: ${d.amil}</small><br>
                  <button class="btn-submit" style="width:auto; padding:5px 15px; background:var(--success)" onclick="accAju(${d.id}, 'ACC')">ACC</button>
                  <button class="btn-submit btn-danger" style="width:auto; padding:5px 15px;" onclick="accAju(${d.id}, 'Tolak')">Tolak</button>
                </div>`;
        });
        document.getElementById('list-pengajuan').innerHTML = h || "Kosong";
      }
    }

    async function accAju(id, act) {
      let res = await kirim({action:"prosesPengajuan", id:id, action:act});
      if(res.sukses) fetchAju();
    }

    function openModalP() { document.getElementById('modalP').style.display='flex'; }
    function closeModalP() { document.getElementById('modalP').style.display='none'; }
    async function saveP() {
      let o = { pesan: document.getElementById('p-pesan').value, batasWaktu: document.getElementById('p-batas').value };
      await kirim({action:"simpanPengumuman", obj:o});
      closeModalP(); fetchNotif();
    }
    
    function logout() { localStorage.clear(); location.reload(); }
  </script>
</body>
</html>
